<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>XIN CHÀO Pickleball Referee DN</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      background:#f8fafc;
      color:#0f172a;
      line-height:1.6;
    }

    .container{
      width:90%;
      max-width:1100px;
      margin:auto;
    }

    header{
      background:#ffffff;
      border-bottom:1px solid #e2e8f0;
      position:sticky;
      top:0;
      z-index:1000;
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 0;
    }

    .logo{
      font-size:1.2rem;
      font-weight:700;
      letter-spacing:1px;
    }

    .menu{
      display:flex;
      gap:30px;
      list-style:none;
    }

    .menu a{
      text-decoration:none;
      color:#334155;
      font-weight:500;
      transition:0.3s;
    }

    .menu a:hover{
      color:#0f172a;
    }

    .hero{
      padding:120px 0 100px;
      background:#ffffff;
    }

    .hero-content{
      max-width:700px;
    }

    .hero h1{
      font-size:4rem;
      line-height:1.1;
      margin-bottom:24px;
      font-weight:700;
    }

    .hero p{
      font-size:1.1rem;
      color:#475569;
      margin-bottom:35px;
    }

    .btn{
      display:inline-block;
      padding:14px 28px;
      background:#0f172a;
      color:#ffffff;
      text-decoration:none;
      border-radius:10px;
      font-weight:600;
      transition:0.3s;
    }

    .btn:hover{
      background:#1e293b;
    }

    section{
      padding:90px 0;
    }

    .section-title{
      margin-bottom:50px;
    }

    .section-title h2{
      font-size:2rem;
      margin-bottom:10px;
    }

    .section-title p{
      color:#64748b;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
    }

    .card{
      background:#ffffff;
      padding:35px;
      border-radius:16px;
      border:1px solid #e2e8f0;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
      box-shadow:0 10px 30px rgba(15,23,42,0.08);
    }

    .card h3{
      margin-bottom:15px;
      font-size:1.1rem;
    }

    .card p{
      color:#64748b;
      font-size:0.95rem;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:20px;
      margin-top:40px;
    }

    .stat{
      background:#0f172a;
      color:#ffffff;
      padding:40px;
      border-radius:16px;
      text-align:center;
    }

    .stat h3{
      font-size:2.5rem;
      margin-bottom:10px;
    }

    .contact{
      background:#ffffff;
      border-radius:20px;
      padding:60px;
      border:1px solid #e2e8f0;
      text-align:center;
    }

    .contact p{
      color:#64748b;
      margin:20px 0 30px;
    }

    footer{
      padding:30px 0;
      text-align:center;
      color:#94a3b8;
      font-size:0.9rem;
    }

    @media(max-width:768px){

      .hero h1{
        font-size:2.6rem;
      }

      .menu{
        gap:15px;
      }

      .contact{
        padding:40px 25px;
      }
    }
  </style>
</head>

<body>



  


  <section id="contact">
    <div class="container">

      <div class="contact">

        <h2>Liên hệ hợp tác</h2>

        <p>
          Kết nối với Pickleball Referee DN để tổ chức
          giải đấu chuyên nghiệp tại Đà Nẵng.
        </p>

        <a href="mailto:pickleballrefereedn@gmail.com" class="btn">
          
        </a>

      </div>

    </div>
  </section>

  <footer>
    <div class="container">
      © 2026 Pickleball Referee DN. All rights reserved.
    </div>
  </footer>

</body>
</html>
